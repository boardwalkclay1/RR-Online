<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RR Online – Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/assets/css/rr-style.css" />
</head>
<body class="rr-page rr-upload">
  <div class="rr-overlay">
    <div class="rr-shell">
      <header class="rr-header">
        <div class="rr-logo">RR <span>Online</span></div>
        <nav class="rr-nav">
          <a href="/index.html">Home</a>
          <a href="/pages/artist-dashboard.html">Artist</a>
          <a href="/pages/marketplace.html">Marketplace</a>
        </nav>
      </header>

      <main class="rr-panel">
        <h1 class="rr-hero-title">Upload release</h1>
        <p class="rr-hero-sub">
          Add your track, set your price, and RR will route 90% of every sale to you.
        </p>

        <form class="rr-form" id="rr-upload-form">
          <div class="rr-field">
            <label for="rr-audio">Audio file</label>
            <input id="rr-audio" type="file" accept="audio/*" required />
          </div>
          <div class="rr-field">
            <label for="rr-title">Title</label>
            <input id="rr-title" type="text" required />
          </div>
          <div class="rr-field">
            <label for="rr-price">Price (USD)</label>
            <input id="rr-price" type="number" min="0" step="0.01" required />
          </div>
          <div class="rr-field">
            <label for="rr-license">License</label>
            <select id="rr-license">
              <option value="personal">Personal use</option>
              <option value="non_exclusive">Non-exclusive</option>
              <option value="exclusive">Exclusive</option>
            </select>
          </div>
          <button class="rr-btn" type="submit">Prepare upload</button>
        </form>
      </main>

      <footer class="rr-footer">
        RR Online · Upload
      </footer>
    </div>
  </div>

  <script src="/assets/js/upload.js"></script>
</body>
</html>
